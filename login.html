<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap - Quan tri Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1a1a1a;
            --card: #2a2a2a;
            --border: #3a3834;
            --gold: #d4a853;
            --gold-dim: #a08040;
            --text: #f0ece4;
            --text-dim: #6a6258;
        }
        body {
            font-family: 'Oswald', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 56px 48px 44px;
            width: 400px;
            max-width: 92vw;
            text-align: center;
        }
        .login-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text);
            margin-bottom: 12px;
        }
        .login-sub {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 40px;
        }
        .login-input {
            width: 100%;
            padding: 16px 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 24px;
        }
        .login-input:focus {
            border-color: var(--gold-dim);
        }
        .login-input::placeholder {
            color: var(--text-dim);
            letter-spacing: 3px;
            font-size: 0.85rem;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--bg);
            border: 1px solid var(--gold);
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: transparent;
            color: var(--gold);
        }
        .login-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .login-error {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 18px;
            display: none;
            letter-spacing: 1px;
        }
        .login-error.show { display: block; }
        .login-back {
            display: block;
            margin-top: 28px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .login-back:hover { color: var(--gold-dim); }
        .line {
            width: 40px;
            height: 1px;
            background: var(--gold-dim);
            margin: 0 auto 32px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="login-title">Quan Tri</h1>
        <div class="line"></div>
        <p class="login-sub">Nhap mat khau de truy cap</p>
        <input type="password" class="login-input" id="passwordInput" placeholder="Mat khau..." autofocus>
        <button class="login-btn" id="loginBtn">Dang nhap</button>
        <p class="login-error" id="loginError">Sai mat khau!</p>
        <a href="index.html" class="login-back">Quay lai trang chu</a>
    </div>

    <script>
        const PASSWORD_HASH = '123456';
        const input = document.getElementById('passwordInput');
        const btn = document.getElementById('loginBtn');
        const error = document.getElementById('loginError');

        function login() {
            const password = input.value.trim();
            if (!password) return;
            error.classList.remove('show');
            if (password === PASSWORD_HASH) {
                sessionStorage.setItem('blog_logged_in', '1');
                window.location.href = 'index.html';
            } else {
                error.classList.add('show');
                input.value = '';
                input.focus();
            }
        }

        btn.addEventListener('click', login);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
